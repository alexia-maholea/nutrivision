<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NutriVision — Login / Register</title>
  <style>
    :root {
      font-family: system-ui, sans-serif;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7eef7;
      --muted: #8fa3b8;
      --accent: #3d9a6e;
      --err: #c45c5c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(160deg, var(--bg), #152028);
      color: var(--text);
    }
    .wrap { width: min(420px, 92vw); }
    h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 0.5rem; }
    p.lead { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.25rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs button {
      flex: 1; padding: 0.6rem; border: none; border-radius: 8px;
      background: #243041; color: var(--muted); cursor: pointer; font-size: 0.95rem;
    }
    .tabs button.active { background: var(--accent); color: #fff; }
    .panel { display: none; background: var(--card); padding: 1.25rem; border-radius: 12px; }
    .panel.active { display: block; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin: 0.75rem 0 0.35rem; }
    input {
      width: 100%; padding: 0.55rem 0.65rem; border-radius: 8px;
      border: 1px solid #2c3a4d; background: #121a24; color: var(--text);
    }
    button.submit {
      width: 100%; margin-top: 1.1rem; padding: 0.65rem; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
    }
    button.submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .out {
      margin-top: 1rem; padding: 0.75rem; border-radius: 8px; font-size: 0.85rem;
      word-break: break-all; background: #121a24; border: 1px solid #2c3a4d;
      min-height: 2.5rem; white-space: pre-wrap;
    }
    .out.error { border-color: var(--err); color: #f0b4b4; }
    .out.ok { border-color: var(--accent); color: #b8e6cf; }
    code { font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NutriVision</h1>
    <p class="lead">Demo page calling your Spring API (same origin — no CORS issues).</p>

    <div class="tabs">
      <button type="button" class="active" data-tab="login">Login</button>
      <button type="button" data-tab="register">Register</button>
    </div>

    <div id="panel-login" class="panel active">
      <form id="form-login">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="username" required />
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required />
        <button class="submit" type="submit">Log in</button>
      </form>
    </div>

    <div id="panel-register" class="panel">
      <form id="form-register">
        <label for="reg-name">Name</label>
        <input id="reg-name" type="text" required />
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" autocomplete="email" required />
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" autocomplete="new-password" required />
        <button class="submit" type="submit">Create account</button>
      </form>
    </div>

    <div id="out" class="out">Responses appear here.</div>
  </div>

  <script>
    const API = ""; // same origin (Spring serves this page on port 8090)

    function show(msg, ok) {
      const el = document.getElementById("out");
      el.textContent = typeof msg === "string" ? msg : JSON.stringify(msg, null, 2);
      el.className = "out " + (ok ? "ok" : "error");
    }

    document.querySelectorAll(".tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tabs button").forEach((b) => b.classList.toggle("active", b === btn));
        document.querySelectorAll(".panel").forEach((p) => {
          p.classList.toggle("active", p.id === "panel-" + tab);
        });
      });
    });

    document.getElementById("form-login").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      try {
        const res = await fetch(API + "/api/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || res.statusText || "Login failed");
        const token = data.access_token;
        if (token) localStorage.setItem("access_token", token);
        show({ status: res.status, body: data, hint: "Token saved to localStorage as access_token" }, true);
      } catch (err) {
        show(String(err.message || err), false);
      }
    });

    document.getElementById("form-register").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("reg-name").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      try {
        const res = await fetch(API + "/api/v1/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        });
        const text = await res.text();
        if (!res.ok) throw new Error(text || res.statusText || "Register failed");
        show(text || "Registered — you can switch to Login.", true);
      } catch (err) {
        show(String(err.message || err), false);
      }
    });
  </script>
</body>
</html>
